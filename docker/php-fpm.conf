[www]
; PHP-FPM ecoute en TCP local (Nginx s'y connecte via fastcgi_pass 127.0.0.1:9000)
listen = 127.0.0.1:9000

user = www-data
group = www-data

; Gestion dynamique des process (ajuster selon la RAM du serveur)
pm = dynamic
pm.max_children = 20
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Logs vers stdout/stderr (visibles dans Coolify)
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
